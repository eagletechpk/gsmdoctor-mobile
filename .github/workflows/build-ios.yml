name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: 'stable'
          cache: true

      - name: Precache iOS artifacts
        run: flutter precache --ios

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Write GoogleService-Info.plist
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST_B64 }}" | base64 --decode > ios/Runner/GoogleService-Info.plist

      - name: Build iOS (no code signing)
        run: flutter build ios --release --no-codesign

      - name: Package as IPA
        run: |
          APP_PATH=$(find build/ios -name "Runner.app" -type d | head -1)
          echo "Runner.app found at: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/Runner.app
          zip -r GSMDoctor.ipa Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: GSMDoctor-iOS-${{ github.run_number }}
          path: GSMDoctor.ipa
          retention-days: 14
